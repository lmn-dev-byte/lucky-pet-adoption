<!DOCTYPE html>
<html>
<head>
    <title>Add Pet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Add New Pet</h1>

<form method="POST">

    <input type="text" name="name" placeholder="Pet Name"><br><br>

    <input type="text" name="breed" placeholder="Breed"><br><br>

    <input type="number" name="age" placeholder="Age"><br><br>

    <input type="text" name="gender" placeholder="Gender"><br><br>

    <button type="submit">Add Pet</button>

</form>

</body>
</html>
