<!DOCTYPE html>
<html>
<head>
    <title>Lucky Pet Adoption - Pets</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🐾 Lucky Pet Adoption Center</h1>

    <a href="/">Home</a>
    <a href="/add_pet">Add Pet</a>
    <a href="/add_adopter">Add Adopter</a>
    <a href="/adopt_pet">Adopt Pet</a>
    <a href="/report">Report</a>

    <h2>Available Pets</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Breed</th>
            <th>Age</th>
            <th>Gender</th>
        </tr>

        {% for pet in pets %}
        <tr>
            <td>{{ pet[0] }}</td>
            <td>{{ pet[1] }}</td>
            <td>{{ pet[2] }}</td>
            <td>{{ pet[3] }}</td>
            <td>{{ pet[4] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
